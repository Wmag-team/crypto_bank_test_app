services:
  app:
    build:
      context: ./docker
    container_name: bank_app_php
    working_dir: /var/www/html
    volumes:
      - ./laravel:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: bank_app
      DB_USERNAME: bank_user
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      - db

  queue-worker:
    build:
      context: ./docker
    container_name: bank_app_queue
    working_dir: /var/www/html
    command: supervisord -c /etc/supervisor/conf.d/queue-worker.conf
    volumes:
      - ./laravel:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: bank_app
      DB_USERNAME: bank_user
      DB_PASSWORD: secret
      QUEUE_CONNECTION: database
    depends_on:
      - db

  webserver:
    image: nginx:1.27-alpine
    container_name: bank_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: bank_app_db
    environment:
      POSTGRES_DB: bank_app
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5444:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

